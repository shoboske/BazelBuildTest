name: Bazel Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Bazel Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Cache: Bazel disk cache (action outputs)
      # This caches compiled artifacts so unchanged targets aren't rebuilt
      # ---------------------------------------------------------------
      - name: Restore Bazel disk cache
        uses: actions/cache@v4
        with:
          path: /tmp/bazel-disk-cache
          key: bazel-disk-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '**/*.bazel', '**/*.bzl', '.bazelrc', '.bazelversion') }}
          restore-keys: |
            bazel-disk-${{ runner.os }}-

      # ---------------------------------------------------------------
      # Cache: Bazel repository cache (external dependencies)
      # This caches downloaded external deps so they aren't re-fetched
      # ---------------------------------------------------------------
      - name: Restore Bazel repository cache
        uses: actions/cache@v4
        with:
          path: /tmp/bazel-repo-cache
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-

      # ---------------------------------------------------------------
      # Cache: Bazel output base (install base, server, etc.)
      # This avoids re-extracting the Bazel install on every run
      # ---------------------------------------------------------------
      - name: Restore Bazel output base
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-output-${{ runner.os }}-${{ hashFiles('.bazelversion') }}
          restore-keys: |
            bazel-output-${{ runner.os }}-

      # ---------------------------------------------------------------
      # Setup Bazel via Bazelisk
      # Bazelisk reads .bazelversion and installs the correct version
      # ---------------------------------------------------------------
      - name: Setup Bazel (via Bazelisk)
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-version: "1.25.0"

      # ---------------------------------------------------------------
      # Build self-contained publish binary
      # This also compiles :bazeltest and //BazelBuildTest.Shared as deps
      # ---------------------------------------------------------------
      - name: Build self-contained binary
        run: bazel build //:publish --config=ci --config=ci-linux

      # ---------------------------------------------------------------
      # Run tests (if any exist)
      # ---------------------------------------------------------------
      - name: Run tests
        run: bazel test //... --config=ci --config=ci-linux || true
        # `|| true` because there are no test targets yet;
        # remove this once you add tests

      # ---------------------------------------------------------------
      # Upload build artifacts
      # ---------------------------------------------------------------
      - name: Upload published binary
        uses: actions/upload-artifact@v4
        with:
          name: published-binary-linux
          path: bazel-bin/publish/
          retention-days: 3
          if-no-files-found: error

  # Optional: Build on Windows to match local dev environment
  build-windows:
    name: Bazel Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Cache: Bazel disk cache (action outputs)
      # ---------------------------------------------------------------
      - name: Restore Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/_bazel-disk-cache
          key: bazel-disk-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '**/*.bazel', '**/*.bzl', '.bazelrc', '.bazelversion') }}
          restore-keys: |
            bazel-disk-${{ runner.os }}-

      # ---------------------------------------------------------------
      # Cache: Bazel repository cache (external dependencies)
      # ---------------------------------------------------------------
      - name: Restore Bazel repository cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/_bazel-repo-cache
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-

      # ---------------------------------------------------------------
      # Setup Bazel via Bazelisk
      # ---------------------------------------------------------------
      - name: Setup Bazel (via Bazelisk)
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-version: "1.25.0"

      # ---------------------------------------------------------------
      # Build self-contained publish binary
      # ---------------------------------------------------------------
      - name: Build self-contained binary
        shell: bash
        run: |
          set -euo pipefail
          bazel build //:publish --config=ci \
            --disk_cache="$RUNNER_TEMP/_bazel-disk-cache" \
            --repository_cache="$RUNNER_TEMP/_bazel-repo-cache"

      # ---------------------------------------------------------------
      # Run tests (if any exist)
      # ---------------------------------------------------------------
      - name: Run tests
        shell: bash
        run: bazel test //... --config=ci --disk_cache="$RUNNER_TEMP/_bazel-disk-cache" --repository_cache="$RUNNER_TEMP/_bazel-repo-cache" || true
        # `|| true` because there are no test targets yet

      # ---------------------------------------------------------------
      # Verify and upload build artifacts
      # ---------------------------------------------------------------
      - name: Verify build output
        shell: bash
        run: |
          echo "--- bazel info ---"
          bazel info output_path
          echo "--- checking bazel-bin/publish ---"
          ls -la bazel-bin/publish/ || echo "bazel-bin/publish not found"

      - name: Upload published binary
        uses: actions/upload-artifact@v4
        with:
          name: published-binary-windows
          path: bazel-bin/publish/
          retention-days: 3
          if-no-files-found: error
